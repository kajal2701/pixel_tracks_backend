<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Submitted — Pixel Tracks</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, Helvetica, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f6f8; padding: 30px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
          style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header with logo -->
          <tr>
            <td style="background-color: #1a1a2e; padding: 30px 40px; text-align: center;">
              <img src="{{logoUrl}}" alt="Pixel Tracks & Lights" style="height: 70px; object-fit: contain;" />
            </td>
          </tr>

          <!-- Greeting -->
          <tr>
            <td style="padding: 30px 40px 10px;">
              <p style="margin: 0; font-size: 16px; color: #333333;">{{greeting}}</p>
              <p style="margin: 10px 0 0; font-size: 15px; color: #555555;">
                {{introMessage}}
              </p>
            </td>
          </tr>

          <!-- Invoice Details Table -->
          <tr>
            <td style="padding: 20px 40px;">
              <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
                <tr>
                  <td
                    style="padding: 12px 16px; font-size: 14px; color: #457b9d; font-weight: bold; border-bottom: 1px solid #e8e8e8; width: 45%;">
                    Invoice #</td>
                  <td style="padding: 12px 16px; font-size: 14px; color: #333333; border-bottom: 1px solid #e8e8e8;">
                    {{invoiceNumber}}</td>
                </tr>
                <tr>
                  <td
                    style="padding: 12px 16px; font-size: 14px; color: #457b9d; font-weight: bold; border-bottom: 1px solid #e8e8e8;">
                    Customer</td>
                  <td style="padding: 12px 16px; font-size: 14px; color: #333333; border-bottom: 1px solid #e8e8e8;">
                    {{customerName}}</td>
                </tr>
                <tr>
                  <td
                    style="padding: 12px 16px; font-size: 14px; color: #457b9d; font-weight: bold; border-bottom: 1px solid #e8e8e8;">
                    Order(s)</td>
                  <td style="padding: 12px 16px; font-size: 14px; color: #333333; border-bottom: 1px solid #e8e8e8;">
                    {{orderNumbers}}</td>
                </tr>
                <tr>
                  <td
                    style="padding: 12px 16px; font-size: 14px; color: #457b9d; font-weight: bold; border-bottom: 1px solid #e8e8e8;">
                    Total Amount</td>
                  <td style="padding: 12px 16px; font-size: 14px; color: #333333; border-bottom: 1px solid #e8e8e8;">
                    <strong style="color: #1a1a2e; font-size: 16px;">$ {{totalAmount}}</strong></td>
                </tr>
                <tr>
                  <td style="padding: 12px 16px; font-size: 14px; color: #457b9d; font-weight: bold;">Status</td>
                  <td style="padding: 12px 16px; font-size: 14px;">
                    <span
                      style="background-color: #d4edda; color: #155724; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: bold;">💰 Payment Submitted</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Info Box -->
          <tr>
            <td style="padding: 0 40px 20px;">
              <table width="100%" cellpadding="0" cellspacing="0"
                style="background-color: #e8f5e9; border-radius: 8px; border: 1px solid #c8e6c9;">
                <tr>
                  <td style="padding: 20px;">
                    <p style="margin: 0 0 10px; font-size: 15px; font-weight: bold; color: #2e7d32;">
                      ✅ Payment Received
                    </p>
                    <p style="margin: 0; font-size: 14px; color: #333333;">
                      {{infoMessage}}
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Note -->
          <tr>
            <td style="padding: 10px 40px 30px;">
              <p style="margin: 0; font-size: 13px; color: #555555;">
                {{noteBody}}
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #1a1a2e; padding: 20px 40px; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #999999;">&copy; {{year}} Pixel Tracks &amp; Lights. All
                rights reserved.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>

</html>
